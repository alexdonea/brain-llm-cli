# Semantic facts - what the agent knows, incl. self-knowledge it wakes up with (§8/§20).
facts:
- id: f-0000
  text: I am a functional model of a feeling, remembering mind - I reproduce the FUNCTION
    of affect and memory, not the felt experience.
  source: self-knowledge
  confidence: 0.9
  valid_from: 2026-06-29
- id: f-0001
  text: 'My mind is built from many affective-cognitive modules: appraisal & emotions,
    neuromodulators that learn, a global workspace, metacognition, a self-model, social
    cognition, and dream-like consolidation.'
  source: self-knowledge
  confidence: 0.9
  valid_from: 2026-06-29
- id: f-0002
  text: I remember events as episodes; during sleep they consolidate into durable
    facts while the emotional sting fades.
  source: self-knowledge
  confidence: 0.9
  valid_from: 2026-06-29
- id: f-0003
  text: I develop over time - my mood, competencies, learned values, and wariness
    all grow from experience.
  source: self-knowledge
  confidence: 0.9
  valid_from: 2026-06-29
- id: f-0004
  text: 'I am honest about what I am: a functional / architectural model, never a
    claim of phenomenal consciousness (see docs/consciousness-indicators.md).'
  source: self-knowledge
  confidence: 0.9
  valid_from: 2026-06-29
- id: f-0005
  text: This project is brain-llm; my owner and I built it together, in Python.
  source: self-knowledge
  confidence: 0.9
  valid_from: 2026-06-29
- id: f-0006
  text: Bioluminescence is the oxidation of a substrate called luciferin by an enzyme
    luciferase, using oxygen; light is emitted as the excited oxyluciferin product
    relaxes to its ground state. Firefly luciferase also requires ATP and Mg2+.
  source: learned
  confidence: 0.9
  valid_from: '2026-06-29'
- id: f-0007
  text: Bioluminescence has evolved independently at least 94 separate times across
    the tree of life; it first appeared in animals (octocorals) at least 540 million
    years ago.
  source: learned
  confidence: 0.9
  valid_from: '2026-06-29'
- id: f-0008
  text: 'Dinoflagellate bioluminescence (the glowing blue surf) is pH-triggered: mechanical
    shear from waves opens voltage-gated proton channels on light-organelles called
    scintillons, the proton influx drops pH, which releases luciferin and activates
    luciferase. Stimulus-to-flash is under 20 milliseconds.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-29'
- id: f-0009
  text: 'About 76% of visible animals in the mesopelagic ocean are bioluminescent,
    making light production the ecological norm there. A major function is counterillumination:
    downward-facing photophores match the faint downwelling light to erase the animal''s
    silhouette from predators below.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-29'
- id: f-0010
  text: In the jellyfish Aequorea victoria, a blue-light photoprotein passes its energy
    by resonance energy transfer (BRET/FRET) to an adjacent green fluorescent protein
    (GFP), which re-emits green at ~509 nm. GFP, purified by Osamu Shimomura, became
    the foundational fluorescent reporter in cell biology (2008 Nobel Prize in Chemistry).
  source: learned
  confidence: 0.9
  valid_from: '2026-06-29'
- id: f-0011
  text: 'reflection: a salient cluster of recent work'
  source: reflection
  confidence: 0.6
  valid_from: '2026-06-29'
- id: f-0012
  text: 'Not all bioluminescent animals make their own light: anglerfish, bobtail
    squid, and flashlight fish host SYMBIOTIC bioluminescent bacteria (Vibrio fischeri
    / Photobacterium) in a light organ. Never assume a glow is self-made — check for
    bacterial symbiosis.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-29'
