name: tests

# Run the unit suite on every push and pull request.
on:
  push:
  pull_request:

permissions:
  contents: read

# A newer push to the same ref cancels an in-progress run.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The engine + the lexical fallback path: pure standard library plus PyYAML, no wordllama / numpy.
  # This is the configuration semantic.py must degrade into, so we test it across every supported Python.
  unit:
    name: unit (py${{ matrix.python }}, no wordllama)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install engine deps + test runner
        run: pip install pyyaml pytest
      - name: Run the suite (lexical fallback path)
        run: python -m pytest tests -q

  # The semantic recall path: the full required dependencies, including wordllama (numpy-only, offline).
  # One Python is enough here; the matrix above already covers version spread. This job also enforces the
  # coverage gate (the highest-coverage configuration, since the wordllama path is exercised too).
  semantic:
    name: semantic backend + coverage (py3.12, wordllama)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install full deps + test runner + coverage
        run: pip install -r requirements.txt pytest coverage
      - name: Run the suite under coverage (semantic recall path) and enforce the gate
        run: |
          python -m coverage run --rcfile=tests/.coveragerc --source=src -m pytest tests -q
          python -m coverage report --rcfile=tests/.coveragerc --fail-under=88

  # Fast, high-signal lint: real bugs only (pyflakes F + syntax E9), config in ruff.toml. The codebase's
  # dense one-liners mean pycodestyle style rules are intentionally off, so this stays meaningful, not noisy.
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint src + tests
        run: ruff check src tests
