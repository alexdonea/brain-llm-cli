- id: f-0063
  text: 'Fama-French 3-Factor Model: Rit − Rft = αi + β1(Rmt − Rft) + β2 × SMB + β3
    × HML + εi. Expands CAPM by adding size factor SMB (Small Minus Big) and value
    factor HML (High Minus Low book-to-market).'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0064
  text: 'Carhart 4-Factor Model: Adds Momentum (WML - Winners Minus Losers or UMD
    - Up Minus Down) to the Fama-French 3-factor model. Explains return persistence
    based on recent 12-month performance.'
  source: Curriculum Phase 1
