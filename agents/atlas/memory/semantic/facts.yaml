- id: f-0048
  text: 'Discounted Cash Flow (DCF): DCF = sum(CF_t / (1 + r)^t) where CF_t is the
    Free Cash Flow at period t, and r is the discount rate (usually WACC). Estimates
    intrinsic value by discounting future cash flows.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0049
  text: 'WACC: WACC = (E/V × Re) + (D/V × Rd × (1 - T)) where E is equity market value,
    D is debt market value, V = E + D, Re is cost of equity, Rd is cost of debt, and
    T is corporate tax rate. Serves as the discount rate.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0050
  text: 'FCF & ROE: Free Cash Flow (FCF) = Operating Cash Flow - CapEx. Return on
    Equity (ROE) = Net Income / Shareholders'' Equity. FCF represents cash available
    for distributions or reinvestment; ROE shows capital efficiency.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0051
  text: 'studied fundamentals & valuation: analyzed DCF valuation, WACC discounting,
    Free Cash Flow (FCF), P/E ratio, EBITDA operational measure, and ROE capital efficiency.'
  source: e-0009
  confidence: 0.7
  affect_charge: 0.538
