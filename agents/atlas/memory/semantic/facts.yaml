- id: f-0073
  text: 'Backtesting Architecture: Vectorized (Pandas/NumPy matrix calculations) is
    fast but struggles with realistic execution modeling and look-ahead bias. Event-Driven
    runs a chronological event-loop, accurately simulating fills, order queues, and
    slippage.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0074
  text: 'Sharpe vs. Sortino: Sharpe = (Rp − Rf) / σp penalizes all volatility. Sortino
    = (Rp − Rf) / σd penalizes only downside deviation (σd). Sortino is superior for
    asymmetric return profiles with large positive outliers.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0075
  text: 'Backtest Pitfalls: Overfitting (optimizing noise/parameters, failing out-of-sample)
    and Look-Ahead Bias (using future data for past trade entry). Mitigate via out-of-sample
    walk-forward tests and point-in-time data.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0076
  text: 'studied backtesting & strategy design: analyzed Vectorized vs Event-Driven
