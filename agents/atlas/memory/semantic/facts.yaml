- id: f-0068
  text: 'Reflexivity Theory (George Soros): Market price formation is a two-way feedback
    loop where participants'' cognitive biases affect market fundamentals, which then
    change price, creating boom-bust cycles instead of equilibrium.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0069
  text: 'Turtle Position Sizing: Sizing is volatility-adjusted. Unit size = (Account
    × 1% risk) / (N × Point_Value), where N is 20-period ATR. Ensures equal dollar
    risk exposure across diverse asset classes.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0070
  text: 'PTJ 200-Day Filter: Primary defensive trend filter: if Price < SMA_200, avoid
