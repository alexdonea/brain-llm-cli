- id: f-0022
  text: 'Bid-Ask Spread: S = P_ask - P_bid. Mid-Price: P_mid = (P_ask + P_bid) / 2.
    Spread % = (S / P_mid) × 100. Lower spreads indicate higher liquidity.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0023
  text: 'Square-Root Law of Market Impact: Impact ≈ Y × σ × sqrt(Q / V) where Impact
    is slippage/shortfall, Y is a constant (~0.5), σ is daily volatility, Q is meta-order
    size, and V is average daily volume. Demonstrates that execution impact is concave,
    scaling non-linearly with volume fraction.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0024
  text: 'Wyckoff Market Cycle: A four-phase institutional framework representing supply/demand
    absorption: Accumulation (Spring/shakeout absorption) -> Markup -> Distribution
    (Upthrust supply release) -> Markdown.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0025
  text: 'studied market structure & microstructure: analyzed Limit Order Book mechanics,
    limit vs market orders, spread calculations, price discovery, the Wyckoff cycle
    phases, and the Square-Root Law of Market Impact.'
  source: e-0004
  confidence: 0.7
  affect_charge: 0.535
  valid_from: '2026-06-22'
