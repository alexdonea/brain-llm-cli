  valid_from: '2026-06-22'
- id: f-0043
  text: 'Returns Distribution: Asset returns exhibit Skewness (asymmetry) and Kurtosis
    (tailedness). Typically leptokurtic (fat-tailed), meaning extreme market moves
    (outliers) occur far more frequently than a Gaussian/Normal distribution predicts.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0044
  text: 'Law of Large Numbers: As the number of trades (N) increases, the actual win
    rate and average outcome converge to the theoretical expected edge. Emphasizes
    that short-term performance is noise, while long-term is mathematical expectancy.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0045
  text: 'Monte Carlo Simulation: Resampling historical trade outcomes randomly over
    thousands of trials to model alternative equity curve paths. Determines statistical
    range of maximum drawdown, drawdown duration, and risk of ruin.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0046
  text: 'studied statistics & probability: analyzed returns distributions (leptokurtosis,
    skewness, fat tails), the Law of Large Numbers (convergence of edge, sample noise
    vs expectancy), and Monte Carlo simulations (reshuffling trade order for max DD/ruin
    calculations).'
  source: e-0008
  confidence: 0.7
