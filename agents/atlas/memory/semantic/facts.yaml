- id: f-0052
  text: 'reflection: a salient cluster of recent work'
  source: reflection
  confidence: 0.6
  valid_from: '2026-06-22'
- id: f-0053
  text: 'Taylor Rule: i = r* + π + 0.5(π − π*) + 0.5(y − y*) where i is target nominal
    policy rate, r* is real neutral rate, π is inflation rate, π* is target inflation
    (2%), and (y - y*) is the output gap. Guides central banks in setting rates.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0054
  text: 'Yield Curve Inversion: Occurs when Yield_10Y - Yield_2Y < 0. Signals that
    short-term rates exceed long-term rates. Historically, sustained inversions have
    preceded economic recessions with a lag of 12-18 months.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0055
  text: 'Market Regimes: Defined by economic states (growth, inflation, volatility).
    High-inflation regimes slow down and distort monetary policy transmission, forcing
    central banks to hold rates higher for longer.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0056
  text: 'studied macro & regimes: analyzed macroeconomic drivers (CPI, Fed Funds rate,
