- id: f-0058
  text: 'Option Greeks: Delta (Δ = ∂V/∂S) is price sensitivity; Gamma (Γ = ∂²V/∂S²)
    is Delta sensitivity; Theta (Θ = ∂V/∂t) is time decay; Vega (ν = ∂V/∂σ) is implied
    volatility sensitivity. Critical for delta hedging and risk management.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0059
  text: 'Put-Call Parity: C + K × e^(−rT) = S + P where C is call price, P is put
    price, S is stock price, K is strike, and e^(−rT) is discount factor. Establishes
    equilibrium; violations create risk-free arbitrage opportunities.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0060
  text: 'Black-Scholes: Call = S × N(d1) − K × e^(−rT) N(d2). Put = K × e^(−rT) N(−d2)
    − S × N(−d1). Where d1 = (ln(S/K) + (r + σ²/2)T) / (σ sqrt(T)) and d2 = d1 − σ
    sqrt(T). Prices European options.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0061
  text: 'studied options & derivatives: analyzed Call/Put mechanics, the Greeks (Delta,
