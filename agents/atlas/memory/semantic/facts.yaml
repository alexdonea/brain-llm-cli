- id: f-0027
  text: 'Candlestick Classification (Al Brooks): Bars are categorized as Trend Bars
    (body > 50% of range, showing directional pressure) or Doji Bars (body < 50% of
    range, representing trading ranges and equilibrium).'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0028
  text: 'Breakout Traps & Buildup: Over 50% of range breakouts fail, forming traps.
    Safe breakout entry requires ''buildup'' (tight consolidation against a support/resistance
    level) indicating absorption of counter-trend liquidity.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0029
  text: 'Signal and Entry Bars (Al Brooks): A Signal Bar is the setup candle (e.g.
    hammer at support). The Entry Bar is the next candle that triggers the trade when
    price moves 1 tick beyond the signal bar''s high/low.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0030
  text: 'studied candlesticks & price action: analyzed Al Brooks bar-by-bar reading
    (trend vs doji bars, signal vs entry bars, breakout traps) and Bob Volman scalp
    price action (buildup pressure, pattern break combos). Context beats patterns.'
  source: e-0005
  confidence: 0.7
  affect_charge: 0.544
  valid_from: '2026-06-22'
- id: f-0031
  text: 'reflection: a salient cluster of recent work'
  source: reflection
  confidence: 0.6
  valid_from: '2026-06-22'
- id: f-0032
  text: 'Dow Theory Trends: Divided into Primary Trend (long-term, 1-3 years), Secondary
    Trend (counter-trend corrections, 1-3 months), and Minor Trend (short-term noise,
    <3 weeks). Trend continuation is assumed until clear structural reversal occurs.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0033
  text: 'Measured Move Projection: Target = Breakout_Price +/- Pattern_Height (where
    Pattern_Height is vertical distance from pattern extreme to breakout neckline).
    Professional practice is to target 60-90% of the projection to offset momentum
    decay.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0034
  text: 'Classic Chart Patterns: Reversals (Head & Shoulders, Double/Triple Tops &
    Bottoms) signal trend exhaustion; Continuations (Flags, Pennants) indicate pausing
    trends; Wedges (Rising/Falling) and Triangles (Symmetrical/Ascending/Descending)
    can be either depending on breakout direction.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0035
  text: 'studied chart patterns & trend analysis: analyzed Dow Theory trend categories
    (Primary, Secondary, Minor), classic reversal and continuation patterns, and measured
    move target projections (calculating height H and applying 60-90% discount).'
  source: e-0006
  confidence: 0.7
  affect_charge: 0.522
  valid_from: '2026-06-22'
- id: f-0036
  text: 'reflection: a salient cluster of recent work'
  source: reflection
  confidence: 0.6
  valid_from: '2026-06-22'
- id: f-0037
  text: 'EMA: EMA_t = (P_t × k) + (EMA_{t-1} × (1 - k)) where k = 2 / (n + 1) is the
    smoothing multiplier, P_t is the current price, and EMA_{t-1} is the previous
    period''s EMA. Gives higher weight to recent prices.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0038
  text: 'RSI: RSI = 100 - (100 / (1 + RS)) where RS = Average_Gain / Average_Loss
    over past n periods (usually 14). Measures momentum speed and change. Traditionally,
    >70 is overbought, <30 is oversold.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0039
  text: 'MACD: MACD_Line = EMA_12 - EMA_26. Signal_Line = EMA_9(MACD_Line). Histogram
    = MACD_Line - Signal_Line. Momentum and trend-following indicator representing
    the convergence/divergence of two EMAs.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0040
  text: 'Bollinger Bands: Middle_Band = SMA_20. Upper_Band = Middle_Band + 2σ. Lower_Band
    = Middle_Band - 2σ. Where σ is the standard deviation of closing price over past
    20 periods. Volatility-based bands.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0041
  text: 'studied technical indicators & their math: analyzed SMA, EMA (smoothing multiplier
    k), RSI (relative strength RS), MACD (line, signal, histogram), and Bollinger
    Bands (moving standard deviation bands). Focus on math behind indicators.'
  source: e-0007
  confidence: 0.7
  affect_charge: 0.528
  valid_from: '2026-06-22'
- id: f-0042
  text: 'reflection: a salient cluster of recent work'
