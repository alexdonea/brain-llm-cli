- id: f-0006
  text: Position size = (account_equity × risk%) / (entry − stop) where risk% is typically
    1-2% of total equity, entry is entry price, and stop is stop-loss price.
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0007
  text: 'Kelly Criterion: f* = W − (1−W)/R where f* is fraction of capital to bet,
    W is win rate, and R is average win / average loss ratio. Recommended to trade
    1/4-Kelly or 1/2-Kelly to mitigate drawdown variance.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0008
  text: Expectancy = (win% × avg_win) − (loss% × avg_loss) where win% + loss% = 1.0;
    R-multiple = profit / initial risk where initial risk = entry − stop.
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0009
  text: 'Drawdown recovery is asymmetric: gain to recover = 1/(1−DD) − 1 where DD
    is drawdown fraction (e.g., 50% loss needs +100% gain to recover to break even).'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0010
  text: ATR = moving average of True Range where TR = max(high−low, |high−prev_close|,
    |low−prev_close|). Standard practice is to size stops in ATR units (e.g., 2.0
    × ATR) to allow for price noise.
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0011
  text: 'Correlation risk: diversified trades in the same sector can spike to correlation
    = 1.0 during market crashes. Total sector risk must be capped to avoid simultaneous
    stop outs.'
  source: Curriculum Phase 1
  confidence: 0.95
  valid_from: '2026-06-22'
- id: f-0012
  text: 'Gap and Slippage risk: market orders or stops do not guarantee execution
    at pre-set prices in gapping markets or thin liquidity. Overnight gaps can bypass
    stops entirely, exceeding expected risk.'
  source: Curriculum Phase 1
  confidence: 0.95
  valid_from: '2026-06-22'
- id: f-0013
  text: 'studied risk management & position sizing: understood that position size
    is determined by stop-loss distance, not target; realized correlation breakdown
    dangers where multiple trades crash together, and gap risk bypassing stops overnight.'
  source: e-0001
  confidence: 0.7
  affect_charge: 0.425
  valid_from: '2026-06-22'
- id: f-0014
  text: 'Risk of Ruin (Balsara): RoR = ((1 - A) / (1 + A))^U where A is edge (often
    win% - loss% or expectancy when payoff is 1:1) and U is capital risk units (Total
    Capital / Dollar Risk per trade). This highlights that position sizing (U) is
    the primary lever to avoid ruin.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0015
  text: 'studied survival math: understood R-multiples, expectancy calculations, the
    asymmetric recovery of drawdown, and Balsara''s Risk of Ruin. Sizing (risk units)
    is the most critical defense against ruin.'
  source: e-0002
  confidence: 0.7
  affect_charge: 0.484
  valid_from: '2026-06-22'
- id: f-0016
  text: 'Prospect Theory (Kahneman & Tversky): Pain of a loss is felt twice as strongly
    as pleasure of an equivalent gain. Leads to the Disposition Effect: selling winners
    too early and holding losers too long in hope of breaking even.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0017
  text: 'Probabilistic Thinking (Mark Douglas): Accepting that each trade''s outcome
    is random and independent. Focuses on execution of an edge over a large sample,
    removing the emotional need to ''be right'' on any single trade.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0018
  text: 'Cognitive Reappraisal (Brett Steenbarger): Restructuring thought patterns
    and cognitive biases in real-time. Actionable via logging emotional states, identifying
    mental traps, and active self-coaching.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0019
  text: 'CLI Regulation Protocol: When arousal is high or urges like greed/fear/revenge
    spike, STOP. Run ''brain-lmm regulate'' to reappraise/suppress, then ''brain-lmm
    deliberate'' to weigh the urge against executive goals.'
  source: Curriculum Phase 1
  confidence: 1.0
  valid_from: '2026-06-22'
- id: f-0020
  text: 'studied trading psychology: analyzed Prospect Theory/Loss Aversion (Kahneman
    & Tversky), Mark Douglas''s probabilistic thinking (Zone mindset), and Dr. Brett
    Steenbarger''s CBT/reappraisal self-coaching. Implemented regulation protocol
    via CLI feel/urge/regulate/deliberate.'
  source: e-0003
