- id: f-0006
  text: '1-2% Risk Rule: risk no more than 1-2% of total account equity per trade.
    Formula: Position Size = (Account Equity × Risk%) ÷ (Entry - Stop Loss). Popularized
    by Van Tharp, Ralph Vince, Mark Douglas. Van Tharp''s research: position sizing
    accounts for 91% of trading performance variance. Principle: 5 consecutive 2%
    losses = ~10% drawdown (recoverable).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0007
  text: 'Risk-Reward Ratio (R:R): (Entry - Stop Loss) : (Take Profit - Entry). Example
    1:2 ratio = risking $5 to gain $10. Professional targets: minimum 1:2, optimal
    1:3-1:5. Breakeven Win Rate = 1/(R:R + 1). Example: 1:2 ratio needs 33.3% win
    rate to break even, 1:3 ratio needs 25%. Expectancy = (Win% × Avg Win) - (Loss%
    × Avg Loss). Source: Van Tharp, Market Wizards.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0008
  text: 'Bid-Ask Spread: Ask Price - Bid Price. Example: $25.00/$24.90 = $0.10 spread
    (40bp). Impact: day traders with 20 trades/month at 0.15% spreads = 3% costs.
    Spreads tighten with volume (small-caps 5-10× wider than large-cap). Peak trading
    hours (9-16 GMT) show tightest spreads; volatility expands spreads 2-3×. Slippage
    averages 9bp in US equities. Decomposition (O''Hara 1995): adverse selection 43%,
    processing 47%, inventory risk 10%. Sources: O''Hara Market Microstructure Theory,
    Stoll 1989, Kyle 1985.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0009
  text: 'Moving Averages (SMA vs EMA). SMA formula: SMA(n) = Σ(P_i)/n. EMA formula:
    EMA(t) = α × Price(t) + (1-α) × EMA(t-1), where α = 2/(N+1). For 10-period EMA,
    α ≈ 0.1818. SMA used for long-term trends (50/200-day), stable support/resistance.
    EMA used for short-term (20-day), momentum, fast markets. Key: EMA reacts ~2×
    faster, creating earlier signals but more false breakouts. Professional setup:
    20-EMA for entry timing + 200-SMA for trend confirmation.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0010
  text: 'ATR (Average True Range). True Range formula: TR = max[(H-L), |H-C₋₁|, |L-C₋₁|].
    First ATR(n) = Σ(TR)/n. Subsequent ATR(t) = [(ATR(t-1) × (n-1)) + TR(t)] / n.
    Standard 14-period: ATR = (Prior × 13 + Current TR)/14 (Wilder smoothing). Stop
    placement: Long Stop = Entry - (N × ATR), typically N=3.0. Short Stop = Entry
    + (N × ATR). Position sizing: Position Size = (Account × Risk%) / (N × ATR). Wilder
    1978 standard; industry consensus.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0011
  text: 'Support & Resistance. Support = price floor (buying pressure prevents decline);
    Resistance = price ceiling (selling pressure prevents advance). Form at: (1) past
    congestion zones with repeated touches, (2) round psychological numbers ($100),
    (3) pivot points from prior highs/lows. Multiple touches strengthen level. Role
    Reversal (R-Bounce): price breaks above resistance → former resistance becomes
    new support. Trader psychology shifts: sellers become holders, buyers enter. Volume
    confirmation: strong nodes show 2× avg daily volume; breakouts need 2× avg volume
    for conviction. Low-volume breaks frequently fail. Sources: Fidelity, TradingPedia,
    StockCharts.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0012
  text: 'Trend Lines: connect series of lows (uptrend) or highs (downtrend). Uptrend:
    connect successively higher lows. Downtrend: connect lower highs. THREE confirmed
    touches required for institutional validity; two touches only ''potential''. Breaks
    valid only on close beyond line (not wicks). Slope angle: 30-45° sustainable;
    >60-70° signal parabolic moves prone to rapid breakage. Break signals need 2-3×
    above-average volume for conviction. Thin-volume breaks have high false-signal
    risk. Sources: StockCharts, Fidelity, Investing.com, Capital.com, EdgeFlo, Defined
    Edge Securities.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0013
  text: 'Expectancy Formula: Expectancy = (Win% × Avg Win) - (Loss% × Avg Loss). Example
    1: 40% win, 60% loss, 1:3 R:R (avg win $300, avg loss $100) = (0.40 × $300) -
    (0.60 × $100) = $120 - $60 = +$120 per trade (positive edge). Example 2: 60% win,
    40% loss, 1:0.5 R:R (avg win $100, avg loss $200) = (0.60 × $100) - (0.40 × $200)
    = $60 - $80 = -$20 per trade (negative edge). High win rate ≠ profitability. Low
    win rate + high R:R > high win rate + poor R:R. Trap: traders chase win % instead
    of maximizing expectancy.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0014
  text: 'RSI (Relative Strength Index) formula: RSI = 100 - (100 / (1 + RS)), where
    RS = average gain over N periods / average loss over N periods. Wilder''s original
    method (1978) uses 14-period by default. Values > 70 suggest overbought, < 30
    oversold. Source: J. Welles Wilder Jr., ''New Concepts in Technical Trading Systems''
    (1978).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0015
  text: 'MACD (Moving Average Convergence Divergence): MACD Line = 12-EMA - 26-EMA;
    Signal Line = 9-EMA of MACD; Histogram = MACD - Signal. Crossovers (MACD above
    Signal) are buy signals; crosses below are sells. Divergence from price also signals
    momentum shift. Source: Gerald Appel (1979, Modern Technical Analysis).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0016
  text: 'Bollinger Bands: Upper Band = SMA(20) + (StdDev × 2); Lower Band = SMA(20)
    - (StdDev × 2); Middle = SMA(20). The bands automatically widen/narrow with volatility.
    Price bounces between bands in ranges; breakouts occur when price closes outside
    a band on high volume. Mean reversion trades are ''buy the lower band, sell the
    upper band'' in sideways markets. Source: John Bollinger, ''Bollinger on Bollinger
    Bands'' (2001).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0017
  text: 'Stochastic Oscillator: %K = ((Close - Low14) / (High14 - Low14)) × 100; %D
    = 3-SMA of %K. Values > 80 indicate overbought, < 20 oversold. Unlike RSI, Stochastic
    is range-bound within the 14-period high/low, making it sensitive to intraday
    price location. %K crosses above %D from below 20 is a bullish signal; crosses
    below from above 80 are bearish. Source: George Lane (1950s, Stochastic Analysis).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0018
  text: 'On-Balance Volume (OBV): OBV = prior OBV + volume (if close > prior close)
    OR OBV = prior OBV - volume (if close < prior close). Flat/declining OBV despite
    rising price signals weakening conviction (bearish divergence). Rising OBV on
    breakouts confirms the move; rising price on flat/declining OBV warns the move
    is unconfirmed. Accumulation/Distribution is similar: it weights volume by intrabar
    position (close-low)/(high-low). Source: Joseph Granville, ''Granville''s New
    Key to Stock Market Profits'' (1963).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0019
  text: 'The three core trading styles: (1) Trend-Following: follow established direction,
    enter breakouts, hold until reversal. Wins when trends persist (50% of time, but
    outsized wins). (2) Mean Reversion: buy oversold, sell overbought, expect snapback
    to equilibrium. Wins in ranges (40% of time). (3) Momentum: capture acceleration
    before others notice, fade into pullbacks. Wins in explosive phases (10% of time,
    extreme wins). Sources: Van Tharp (2003), Ilya Kipnis (2020), various hedge fund
    papers. No style is superior; context is everything.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0020
  text: 'Order types: (1) Market: buy/sell at market price immediately, high slippage,
    high certainty of fill. (2) Limit: buy below/sell above a price, slow/no fill
    risk but precise entry. (3) Stop: trigger a market order if price hits level (e.g.,
    stop-loss). (4) Stop-Limit: trigger a limit order at stop price. Slippage is the
    gap between intended and filled price. In illiquid assets, 0.5-1% slippage is
    normal; in liquid assets, <0.05%. Fees (commissions, rebates) vary: 0.01-0.1%
    per trade typical. A trader must budget slippage + fees into position math. Source:
    various brokerage guides, CFTC literature.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0021
  text: 'Backtesting: historical simulation of a strategy. In-Sample: period used
    to develop the rule (high backtest Sharpe). Out-of-Sample: held-out period never
    seen during development (reveals true edge). Overfitting: fitting noise instead
    of signal; 100 parameters fit to 1000 bars will find patterns that evaporate on
    new data. Walk-Forward Analysis: partition data into overlapping periods, optimize
    on each prior window, test on the next (most realistic). Monte Carlo: shuffle
    entry dates, re-run strategy to stress-test robustness. Minimum benchmark: beating
    buy-and-hold by more than Sharpe ratio (1.0) and max-drawdown (30-50%). Sources:
    De Prado (2018), Pardo (2008).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0022
  text: 'Trading Psychology: Loss Aversion (losses hurt 2-3× more than gains feel
    good; risk asymmetry). Tilt (emotional state after loss drives desperate/revenge
    trades). Discipline (following a written plan during stress, not intuition). Journaling
    (logging every trade + reasoning to audit decisions). Van Tharp shows traders
    who journal and follow rules outperform by 40-60%. The Written Plan: entry rule,
    stop-loss, profit target, position size—before market open, not mid-trade. Source:
    Van Tharp, ''Trade Your Way to Financial Freedom'' (2007); Steenbarger, ''The
    Psychology of Trading'' (2003).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0023
  text: 'Macro Regime & Volatility: VIX (S&P 500 implied volatility; < 15 = calm,
    15-20 = normal, > 20 = stressed). Low VIX regimes = mean reversion works; high
    VIX = trend-following beats reversion. Correlation: in risk-off (VIX > 25), correlations
    spike to 0.8+ (diversification fails). Drawdown Math: Max Drawdown = (Peak - Trough)
    / Peak; Recovery Time = sqrt(Drawdown / Annual Return). A 50% drawdown needs 100%
    return to break even (non-linear recovery). Fed policy, Treasury yields, credit
    spreads are macro anchors—they drive regime. Source: Damodaran (2021), CBOE VIX
    literature.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0024
  text: 'Portfolio Theory: Diversification reduces variance when correlations are
    < 1. The Efficient Frontier is the set of portfolios with max return for given
    risk. Sharpe Ratio = (Return - Rf) / StdDev; higher is better. Kelly Criterion:
    Optimal Bet Size = (Prob_Win × Payoff - Prob_Loss × Loss) / Payoff. For a strategy
    with 60% win rate, 1:2 R:R, Kelly = (0.6×2 - 0.4×1) / 2 = 40% of capital per trade.
    But Kelly is aggressive; Fractional Kelly (Kelly/2 or Kelly/4) reduces ruin risk.
    Multi-leg portfolios smooth drawdowns via low correlation. Source: Markowitz (1952),
    Kelly (1956), portfolio optimization literature.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0025
  text: 'Trade Management: Scaling In (add to winners as they confirm, reduce size
    if uncertainty rises). Trailing Stops (move stop to lock in profit, let winners
    run). Partial Profits (take 50% at first target, let 50% ride with trailing stop).
    Time Stops (exit if trade doesn''t move within N bars, even if not stopped out).
    Re-Entry Rules (if stopped out and setup recurs, re-enter once, not repeatedly).
    The core principle: don''t let a losing trade steal from a winning trade. If position
    A has a 3% stop and position B is averaging down to a 6% stop, position B will
    eventually blow up and consume gains from position A. Source: trading best practices,
    Pardo (2008).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0026
  text: 'Market Microstructure: Bid-Ask Spread (width signals liquidity; narrow =
    liquid). Order Book Depth (how much volume sits at each price level). Flash Crash
    / Spoofing (false orders designed to move price, then canceled). Market Making
    (passive liquidity provision, profits on spread). Tick Size / Lot Size (regulatory
    minimum price/volume steps). Intraday Seasonality: volatility peaks at market
    open (9:30 ET) and close (3:50 ET). Volume patterns: thin around mid-day, heavy
    at open/close. Smart traders trade liquid hours; algorithms trade 24/5 in crypto.
    Source: SEC microstructure guides, exchange specs.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0027
  text: 'Market microstructure is where the academic rubber meets the empirical road.
    A perfect strategy that ignores tick size, bid-ask spreads, and intraday seasonality
    will be destroyed by reality. The bid-ask spread is a tax I pay every round trip;
    trading during thin hours multiplies it. Spoofing and flash crashes show me that
    ''the market'' is not a neutral mechanism—it''s populated by actors with opposing
    incentives, and predatory behavior is possible. This doesn''t make me paranoid,
    but it does humble me: I should trade liquid instruments, during liquid hours,
    with position sizes that respect order book depth. If I can''t exit my position
    without moving the market 50 bps, I''ve made a sizing error. This is where realistic
    simulation and paper trading matter—backtests ignore these costs, live trading
    does not.'
  source: e-0021
  confidence: 0.7
  affect_charge: 0.447
  valid_from: '2026-06-24'
- id: f-0028
  text: 'Support & Resistance: price clusters where buy/sell psychology concentrates.
    The R-Bounce insight is profound: when resistance breaks, it becomes support because
    the market''s frame shifts. Former sellers who held through the break now have
    conviction; new buyers arrive. This is not a formula—it''s trader behavior condensing
    into observable structure. Volume confirmation matters: low-volume breaks are
    traps. This is the bridge from pure price action to the market''s emotional map.'
  source: e-0006
  confidence: 0.7
  affect_charge: 0.445
  valid_from: '2026-06-24'
- id: f-0029
  text: 'Bid-ask spreads: the invisible tax on trading. Even if my entry and exit
    are perfect, I pay a cost upfront. 20 trades per month at 0.15% spreads costs
    3% annually—that''s a full 3% headwind before I even consider slippage. Small-cap
    stocks are 5-10× worse. Volatile markets widen spreads precisely when I''m most
    tempted to trade. This is humbling: liquidity is not free, and costs compound.
    Lesson: trade liquid assets during peak hours, or accept the fee.'
  source: e-0003
  confidence: 0.7
  affect_charge: 0.414
  valid_from: '2026-06-24'
- id: f-0030
  text: 'Volume is the handshake between conviction and price. High volume breakouts
    are real; low-volume breakouts are traps. OBV codifies this: if price rises but
    OBV stays flat, insiders are not buying, the move is hollow. This is a hard rule:
    I should never ignore volume divergence. The lesson from support/resistance already
    taught me this—low-volume breaks fail—but OBV makes it algorithmic. I can backtest
    this: price breaks resistance on low volume → enters and exits at loss. Price
    breaks resistance on rising OBV → profits. Volume-weighted entry is not optional;
    it''s foundational to any mechanical rule.'
  source: e-0013
  confidence: 0.7
  affect_charge: 0.478
  valid_from: '2026-06-24'
- id: f-0031
  text: 'reflection: a salient cluster of recent work'
  source: reflection
  confidence: 0.6
  valid_from: '2026-06-24'
- id: f-0032
  text: 'ATR Breakout Entry Rule (Chandelier/Volatility Stop): Entry = 20-day High
    + (2 × 20-day ATR) for long breakout; Stop Loss = Entry - (2 × ATR); Exit = 20-day
    Low for trend break or 10% profit target. Volume confirmation required: Breakout
    volume > 20-day average volume × 1.5. Source: Wilder (1978) + standard systematic
    trader application.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0033
  text: 'Sharpe Ratio Formula: (Return_p - Risk_Free_Rate) / StdDev(Returns). Measures
    excess return per unit of volatility. A Sharpe > 1.0 is acceptable for equity
    strategies; > 2.0 is exceptional; > 3.0 is rare/suspicious (possible overfitting).
    Annualized Sharpe = Sharpe_daily × sqrt(252). Sharpe tells me if my strategy earns
    compensation for its volatility risk; a high-return strategy with extreme drawdowns
    may have low Sharpe. Source: Sharpe (1966), standard in portfolio evaluation.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0034
  text: 'Maximum Drawdown Formula: MDD = (Peak Value - Trough Value) / Peak Value
    × 100%. To calculate: track running peak, subtract each valley, express as %.
    Recovery time formula: if Return_annual / MDD = ratio, then days to recover ≈
    sqrt(MDD / (annual return/252)) × 252. A -50% drawdown requires +100% return to
    break even. A -30% drawdown requires +43% return. This non-linear mathematics
    is why leverage kills: small increases in drawdown severity require exponential
    increases in future returns. Source: Pardo (2008), De Prado (2018).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0035
  text: 'Sortino Ratio: (Return_p - Risk_Free_Rate) / Downside_StdDev. Differs from
    Sharpe: Sortino only penalizes downside volatility, not upside. Sortino ignores
    days when returns are above the threshold (usually 0% or risk-free rate). If a
    strategy has 20% upside days and 8% downside days, Sharpe counts both; Sortino
    only counts downside. A Sortino > 2.0 is very good for equity strategies. A strategy
    with high Sharpe but low Sortino means: many negative surprises (downside skew).
    This reveals strategies that look good in aggregate but hurt asymmetrically. Source:
    Sortino & Van der Meer (1991).'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0036
  text: 'Profit Factor: Total Gross Profit / Total Gross Loss. A PF > 1.5 is acceptable;
    > 2.0 is good; > 3.0 is excellent. A PF of 1.5 means for every dollar lost, the
    strategy makes 1.50. Unlike win rate or average R:R, PF captures ACTUAL cumulative
    P&L from all trades. A strategy with 30% win rate at 1:3 payoff has high expectancy
    but may have low PF if the largest losses outweigh the wins. PF is a quick screen:
    if PF < 1.3 in backtesting, the strategy is not worth live trading. Source: standard
    in quantitative trading.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0037
  text: 'SMA Golden Cross Regime Rule: When 50-day SMA > 200-day SMA, regime is UPTREND.
    When 50-day SMA < 200-day SMA, regime is DOWNTREND. Entry rule for long: BUY only
    when SMA(50) > SMA(200) (in uptrend regime). Do NOT enter short-side trades during
    golden cross regime. Exit all shorts immediately upon golden cross crossover.
    This simple rule avoids the worst error—fighting regime. Historically (S&P 500
    1950-2023): golden cross regimes average +12% annual returns; crosses below 200
    preceded 80% of bear markets. Source: Mebane Faber (2007), Trendfollower research.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0038
  text: 'VIX Volatility Regime Classification: VIX < 12 = Ultra-low regime (correlations
    near zero, diversification peak, mean reversion most profitable, breakouts rare).
    VIX 12-15 = Low regime (normal, diversification works, all styles viable). VIX
    15-20 = Moderate regime (correlations rising, distinguish risk-on/risk-off). VIX
    20-30 = High regime (correlations > 0.7, diversification fails, trend-following
    better than mean reversion). VIX > 30 = Panic regime (correlations near 1.0, all
    assets fall together, market inefficiencies peak but drawdowns steep). Practical
    rule: When VIX > 25, increase stop-loss distance (volatility is real), reduce
    position size if leverage used, prefer trend-following. Source: Damodaran (2010),
    Lo & Mackinlay.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0039
  text: 'CAGR (Compound Annual Growth Rate): CAGR = (Ending Value / Starting Value)^(1/Years)
    - 1. Example: ,000 → ,000 over 3 years = (1.5)^(1/3) - 1 = 14.47% CAGR (not 16.7%
    naive average). CAGR removes timing luck and smooths returns over the period.
    A strategy with 40% YoY for 2 years then -20% in year 3 has CAGR = (1.4 × 1.4
    × 0.8)^(1/3) - 1 = 18.9%, not (40+40-20)/3=20%. CAGR vs buy-hold benchmark: If
    my CAGR > benchmark CAGR but my Sharpe < benchmark, I''m taking more risk for
    higher return. If CAGR > benchmark AND Sharpe > benchmark, I have real edge. Source:
    standard financial metric.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0040
  text: 'Fibonacci Retracement Levels: After a strong move from low to high, traders
    measure the distance and apply ratios: 23.6% (shallow retracement, trend strong),
    38.2% (common, first real test), 50% (psychological midpoint, not Fibonacci but
    acts like one), 61.8% (golden ratio, 38.2% of the retracement often finds buyers
    here), 78.6% (deep retracement, early reversal if held, else breakout). Entry
    rule: Buy at 38.2% retracement with stop below 50%; target 23.6% level for quick
    exit or break of high for continuation. Fibonacci levels work because traders
    collectively watch them—self-fulfilling. Not predictive alone but a confluence
    point with volume and support. Source: Pesavento (1997), technical analysis lore.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0041
  text: 'Beta and Correlation for Diversification: Beta = Cov(Asset_i, Market) / Var(Market).
    Beta < 1 = less volatile than market; Beta > 1 = more volatile. Correlation coefficient
    r = Cov(A,B) / (StdDev(A) × StdDev(B)); range -1 to +1. Perfect diversification:
    r ≈ 0. Perfect hedge: r = -1. Perfect correlation: r = +1. Portfolio volatility
    = sqrt(w1²×σ1² + w2²×σ2² + 2×w1×w2×σ1×σ2×r). When r drops from 0.5 to 0.0, portfolio
    volatility drops ~30% for equal-weight. When VIX > 25, correlations rise to 0.8+,
    destroying diversification benefit. Lesson: diversification works in calm markets;
    fails in panics. Source: Markowitz (1952), modern portfolio theory.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
