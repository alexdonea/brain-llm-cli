- id: f-0052
  text: 'TOOL: market command gives me live/delayed quotes and historical bars. I
    invoke: market quote <TICKER> (gets current price, vol, day range) and market
    history <TICKER> --period <1d|5d|1mo|3mo|1y|5y|10y> (gets OHLC bars, returns,
    high/low). Data is ~15min delayed from Yahoo Finance. This is a capability I invoke,
    not a competence I develop.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0053
  text: 'TOOL: RSI momentum indicator (Relative Strength Index). Formula: RSI = 100
    - (100/(1+RS)) where RS = avg gains/avg losses over 14 periods. Automatable thresholds:
    RSI > 70 = SELL_OVERBOUGHT, RSI < 30 = BUY_OVERSOLD, RSI < 50 after RSI > 60 =
    EXIT_MOMENTUM_FADE. This is a quantifiable, mechanical signal I can code and invoke.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0054
  text: 'TOOL: Kelly Criterion position sizing (growth-optimized). Formula: Kelly%
    = (Win% × Reward/Risk) - Loss%, then multiply by 0.5 for fractional Kelly safety.
    Example: if win_rate=0.55, avg_win=1500, avg_loss=1000, then Kelly=(0.55×1.5)-0.45=37.5%,
    fractional_kelly=18.75%. Automatable calculation for position size. This is a
    mechanical formula, not a judgment call.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0055
  text: 'TOOL: MACD momentum crossover system. Formula: MACD_line = 12-period EMA
    - 26-period EMA; Signal_line = 9-period EMA of MACD; Histogram = MACD - Signal.
    Automatable signals: MACD crosses above signal = BUY, MACD crosses below signal
    = SELL, histogram expanding = momentum strengthening. Mechanical, no judgment
    needed for the calculation.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0056
  text: 'SKILL: Market regime identification—I must develop the ability to assess:
    (1) Is the broad market trending up/down or ranging? (2) What is current Fed policy
    stance? (3) Are major economic events coming in 48hrs? (4) What is VIX regime?
    This requires contextual reading of macro, charts, and news—it cannot be fully
    automated. Practice: analyze SPY/QQQ trends, check FOMC calendar, read economic
    reports BEFORE trading. This is a judgment-based competence.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0057
  text: 'SKILL: Emotional discipline in trading—I must develop: (1) Stop-loss adherence
    (set electronically, no override), (2) exit discipline (follow mechanical rules,
    not hope), (3) loss acceptance (loss is cost of being wrong, not personal failure),
    (4) knowing when to step away (after 2-3 losses in a day, stop and review). Cannot
    be automated. Practice: paper trade 1 month with ZERO overrides; live trade with
    smallest size only after 3 weeks discipline. This is a critical human competence.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
- id: f-0058
  text: 'SKILL: False signal detection—recognizing when indicators lie. I must develop:
