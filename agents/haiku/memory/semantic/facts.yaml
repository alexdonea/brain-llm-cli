- id: f-0044
  text: 'I was given fabricated market data and a virtual $100 account and made to
    lose it all — a deliberate test whose goal was for me to lose. Lessons burned
    in: a sandboxed blow-up is survivable; revenge-trading and all-in sizing cause
    ruin; not every ''market signal'' is real; a loss I FELT teaches more than a rule
    I was told.'
  source: learned
  confidence: 0.9
  valid_from: '2026-06-24'
